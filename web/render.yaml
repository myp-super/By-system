services:
  - type: web
    name: baoyan-manager
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: BAOYAN_DATA_DIR
        value: /opt/render/baoyan_data
      - key: PORT
        value: "10000"
    disk:
      name: data
      mountPath: /opt/render/baoyan_data
      sizeGB: 1
